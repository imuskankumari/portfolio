<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Theory-1</title>
</head>

<body>
    <h1><center><u>Javascript in Write Base Examples</center></u></h1>
    <script>
        document.write("<h2><center><u>Example-1</u></center></h2>");
        document.write("<h1>Jai Shree Ram</h1>");
        document.write("<h2>Jai Shree Ram</h2>");
        document.write("<h3>Jai Shree Ram</h3>");
        document.write("<h4>Jai Shree Ram</h4>");
        document.write("<h5>Jai Shree Ram</h5>");
        document.write("<h6>Jai Shree Ram</h6>");
        document.write("<br>");
        document.write("<h2><center><u>Example-2</u></center></h2>");
        a=100;
        name="Jai Shree Krishna";
        b="Jai Shree Ram";
        c="Hanuman";
        document.write(a +"<br>");
        document.write(name+"<br>");
        document.write(b +"<br>");
        document.write(c);
        document.write("<br>"+"<br>");
        document.write("<h1>");
        document.write("<h2><center><u>Example-3 Concatinate Operator</u></center></h2>");
        document.write(" <br>");
        a="Jai Jai Shree Ram";
        b="Hanuman";
        c="Muskan";
        d="Kumari";
        document.write(""+a +"<br>");
        document.write(""+b +"<br>");
        document.write(""+a +" "+b +"<br>");
        document.write(""+c +"<br>");
        document.write(""+d +"<br>");
        document.write(""+c +" "+d +"<br>");
    </script>
    
</body>
</html>
