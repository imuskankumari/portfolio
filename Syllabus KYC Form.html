<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus KYC Form</title>
</head>

<body>
    <table height="50" width="500" bgcolor="#99ff33">
        <tr>
        <td align="center"><font color="light blue" size="1000">Indian KYC Form</font>
        </tr>
        </table>
        <br><br>
    <fieldset>
    <legend>KYC FORM</legend>
    <form id="KYC Form">
    <div>
    <fieldset>
        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter Your Name">
    </div>
    </fieldset>
    <fieldset>
    <div>
        <label>Account Number:</label><br>
        <input type="text" maxlength="10" placeholder="..... .....">
    </div>
    </fieldset>
    <fieldset>
    <div>
        <label>Date Of Birth:</label>
        <input type="date" required>
    </div>
    </fieldset>
    <fieldset>
    <div>
        <label>Gender:</label><br>
        <input type="radio">Female <input type="radio">Male <input type="radio">Other
    </div>
    </fieldset>
    <fieldset>
    <div>
        <label>Mobile Number:</label><br>
        <input type="tel" placeholder="+91 4555455545" required>
    </div>
    </fieldset>
    <fieldset>
    <div>
        <label>Email ID:</label><br>
        <input type="email" placeholder="@nameexample.com"
        required>
    </div>
</fieldset>
<fieldset>
    <div>
        <label>Address:</label><br>
        <textarea name="textarea" cols="40" rows="5" id="textarea"></textarea>
    </div>
    </fieldset>
    <fieldset>
        <label>ID Proof:</label><br>
        <select>
            <option>Aadhar Card</option>
            <option>PAN Card</option>
        </select>
        <div>
        </fieldset>
            <label><input type="checkbox" required> I confirm that above details are correct</label>
        </div>
        <button type="submit">Submit</button> <button type="Reset">Reset</button>
    </form>
    </fieldset>


</body>

</html>
