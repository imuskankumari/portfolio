<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI KYC Updation Form 2026</title>
</head>
<body>
    <!-- 2026 SBI Standardized KYC Form Structure -->
    <form action="/submit-kyc" method="POST" enctype="multipart/form-data">
        <h1>SBI KYC UPDATION FORM (INDIVIDUAL)</h1>
        
        <!-- SECTION 1: Account & Branch Info -->
        <fieldset>
            <legend>Branch & Account Details</legend>
            <label for="branch_name">Branch Name*:</label>
            <input type="text" id="branch_name" name="branch_name" required><br><br>

            <label for="account_no">Account Number*:</label>
            <input type="text" id="account_no" name="account_no" pattern="\d{11}" placeholder="11-digit number" required><br><br>

            <label for="ckyc_no">CKYCR No. (if available):</label>
            <input type="text" id="ckyc_no" name="ckyc_no" placeholder="14-digit CKYC number"><br><br>
        </fieldset>

        <!-- SECTION 2: Personal Details -->
        <fieldset>
            <legend>Personal Identification</legend>
            <label for="full_name">Full Name (As per ID Proof)*:</label>
            <input type="text" id="full_name" name="full_name" required><br><br>

            <label for="dob">Date of Birth*:</label>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="pan">PAN Card Number (or Form 60)*:</label>
            <input type="text" id="pan" name="pan" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" placeholder="ABCDE1234F" required><br><br>
        </fieldset>

        <!-- SECTION 3: Officially Valid Documents (OVD) -->
        <fieldset>
            <legend>Identification Documents (OVD)</legend>
            <p>Please select one document submitted*:</p>
            <input type="radio" id="passport" name="ovd_type" value="passport" required>
            <label for="passport">Passport</label><br>
            <input type="radio" id="voter_id" name="ovd_type" value="voter_id">
            <label for="voter_id">Voter ID</label><br>
            <input type="radio" id="aadhaar" name="ovd_type" value="aadhaar">
            <label for="aadhaar">Aadhaar (Last 4 digits & Masked Copy)</label><br>
            <input type="radio" id="driving_license" name="ovd_type" value="driving_license">
            <label for="driving_license">Driving License</label><br><br>

            <label for="ovd_no">Document/Identification Number*:</label>
            <input type="text" id="ovd_no" name="ovd_no" required><br><br>
        </fieldset>

        <!-- SECTION 4: Contact & Income -->
        <fieldset>
            <legend>Address & Financial Profile</legend>
            <label for="current_address">Current Address*:</label><br>
            <textarea id="current_address" name="current_address" rows="3" required></textarea><br><br>

            <label for="mobile">Mobile Number*:</label>
            <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="10-digit mobile" required><br><br>

            <label for="income">Annual Income Detail:</label>
            <select id="income" name="income">
                <option value="below_1l">Below 1 Lac</option>
                <option value="1_5l">1-5 Lac</option>
                <option value="5_10l">5-10 Lac</option>
                <option value="above_10l">Above 10 Lac</option>
            </select><br><br>
        </fieldset>

        <!-- SECTION 5: Declaration -->
        <fieldset>
            <legend>Declaration</legend>
            <input type="checkbox" id="declaration" name="declaration" required>
            <label for="declaration">I hereby declare that the KYC details submitted are true and correct to the best of my knowledge.</label><br><br>
        </fieldset>

        <button type="submit">Submit KYC Updation Request</button>
    </form>
</body>
</html>
