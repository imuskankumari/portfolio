<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <div class="contact-wrapper">
        <h1 class="page-title">Let's Collaborate</h1>
        <p class="subtitle">Have an exciting design project or need vector work? Let's connect.</p>

        <div class="form-container">
            <form action="#">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Your Message</label>
                    <textarea rows="5" placeholder="Describe your design needs..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </div>
    </div>

</body>
</html>
