<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Theory-3</title>
</head>
<body>
    <script>
        a=prompt("Enter Your Name");
        b=prompt("Enter Your Course");
        document.write("<h1>"+"Your Name is="+a+"<br>"+"Your Course is="+b+"</h1>");
        a=parseInt("10");
        b=parseInt("10.33");
        c=parseInt("10.00");
        document.write("<h1>"+"No.1="+a+"<br>"+"No.2="+b+"<br>"+"No.3="+c+"</h1>");
        a=parseFloat("10");
        b=parseFloat("10.33");
        c=parseFloat("10.00");
        document.write("<h1>"+"No.1="+a+"<br>"+"No.2="+b+"<br>"+"No.3="+c+"</h1>");
    </script>
</body>
</html>
