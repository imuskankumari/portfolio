<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Lead Generation Form</title>
</head>
<body>
    <table height="100" width="500" bgcolor="#99ff33">
        <tr>
            <td align="center"><font color="blue" size="20">Lead Generation Form</font><hr color="blue" size="5"></td>
        </tr>
    </table>
    <br><br>
    <fieldset>
        <legend>Lead Generation Form</legend>
    <form id="Lead Generation Form">
        <div>
            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter Your Name" required>
        </div>
        <div>
            <label>E-mail Address:</label><br>
            <input type="email" placeholder="@nameexample.com" required>
        </div>
        <div>
            <label>Phone Number:</label><br>
            <input type="tel" placeholder="+91 4545454545" required>
        </div>
        <div>
            <label>Company:</label><br>
            <input type="text" placeholder="Enter Your Company Name" required>
        </div>
        <div>
            <label>Message:</label><br>
            <textarea name="textarea" cols="40" rows="5" id="textarea"></textarea>
        </div>
        <button type="submit">Submit</button> <button type="Reset">Reset</button>
    </form>
    </fieldset>
    
    
</body>
</html>
