<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskan Kumari | Creative Portfolio</title>
    <link rel="stylesheet" href="index.css">
    <!-- Font awesome icons ke liye link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- LEFT PREMIUM SIDEBAR PANEL -->
    <div class="sidebar">
        <div class="profile-box">
            <!-- Aapki round profile photo yahan aayegi -->
            <img src="logo.jpg" alt="Muskan Kumari" class="profile-img">
            <h2>Muskan Kumari</h2>
            <p class="tagline">Graphic & Web Designer</p>
        </div>

        <!-- MODERN GLOWING NAVIGATION BUTTONS -->
        <nav class="nav-menu">
            <a href="home.html" target="main-display" class="nav-btn active"><i class="fas fa-home"></i> Home</a>
            <a href="gallery.html" target="main-display" class="nav-btn"><i class="fas fa-palette"></i> Gallery</a>
            <a href="services.html" target="main-display" class="nav-btn"><i class="fas fa-laptop-code"></i> Services</a>
            <a href="contact.html" target="main-display" class="nav-btn"><i class="fas fa-envelope"></i> Contact</a>
        </nav>

        <!-- SOCIAL FOOTER LINKS -->
        <div class="social-links">
            <a href="https://behance.net/musankumari143" target="_blank"><i class="fab fa-behance"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <!-- RIGHT MAIN WINDOW AREA (No Empty Space) -->
    <div class="main-content">
        <iframe src="home.html" name="main-display" frameborder="0" class="display-frame"></iframe>
    </div>

    <script>
        // Active button glow effect script
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
