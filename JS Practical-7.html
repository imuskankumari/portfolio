<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practical-7</title>
</head>
<body>
    <form name="f1">
        <input type="button" value="click_me" name="clk" onclick="clickf()">
    <br><br>
    <input type="button" value="double_click_me" name="dclick" ondblclick="dclickf()">
    <br><br>
    <input type="button" value="mouse_over_me" name="mo" onmouseover="mof()">
    <br><br>
    <input type="text" name="ch" onchange="chf()">
    <br><br>
    </form>
    <script>
        function clickf()
        {
            f1.clk.value="i m clicked";
            f1.clk.bgColor="red";
        }
        function dclickf()
        {
        f1.dclick.value="i m double clicked";
        }
        function mof()
        {
            f1.mo.value="mouse is over me";
        }
        function chf()
        {
            document.bgColor=f1.ch.value;
        }
    </script>
</body>
</html>
