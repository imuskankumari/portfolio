<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Theory-6 Switch Case With bg,fg</title>
</head>
<body>
    <h1><u>Foreground and Background Color using Switch Case</u></h1>
    <h1 id="text">JavaScript Switch Case Example</h1>
    <script>
        let choise ="red";
        let text = document.getElementById("text");
        switch(choise) {
            case"red":
            text.style.backgroundColor="red";
            break;
            case"green":
            text.style.color="black";
            text.style.backgroundColor="green";
            break;
            case"blue":
            text.style.backgroundColor="blue";
            break;
            default:
                text.style.color="black";
                text.style.backgroundColor="lightgray";
        }
    </script>
    <h1>Switch Case Color Change</h1>
    <h1 id="text">Hello World</h1>

            default:

    </script>
    <input type="text" id="txt" onchange="changeColor()">
    <script>
        function changeColor() {
            value = document.getElementById("txt").value;
            switch(value) {
                case "red":
                document.body.style.backgroundColor="red";
                document.body.style.color="white";
                break;
                case "blue":
                document.body.style.backgroundColor="blue";
                document.body.style.color="yellow";
                break;
                case "green":
                document.body.style.backgroundColor="green";
                document.body.style.color="black";
                break;
                default:
                    document.body.style.backgroundColor="white";
                    document.body.style.color="black";
            }
        }
    </script>
    
</body>
</html>
