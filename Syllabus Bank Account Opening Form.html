<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Bank Account Form</title>
</head>
<body>
    <h1>Bank Account Opening Form</h1>
    <form id="Banking Form">
        <fieldset>
            <legend>Personl Information</legend>
        <fieldset>
            <div>
                <label>Full Name:</label>
                <input type="text" placeholder="Enter Your Full Name" size="60" required>
            </div>
        </fieldset>
        <fieldset>
            <div>
                <label>Date Of Birth:</label><input type="date" required>            
            </div>
        </fieldset>
        <fieldset>
            <div>
                <label>Gender:</label>
                <input type="radio" required>Female <input type="radio" required>Male <input type="radio" required>Other
            </div>
        </fieldset>
        <fieldset>
            <div>
                <label>Select Your Nationality:</label>
                <select>
                    <option value="">Select Your Nationality</option>
                    <option>Indian</option>
                    <option>Amarican</option>
                    <option>Russian</option>
                    <option>Chini</option>
                    <option>Australian</option>
                </select>
            </div>
        </fieldset>
        <fieldset>
            <legend>Contact Details:</legend>
            <div>
                <label>E-mail Address:</label>
                <input type="email" placeholder="@exampleemail.com" size="60" required>
            </div>
            <br>
            <div>
            <label>Phone Number:</label>
            <input type="tel" placeholder="+91 5246578616" size="30" required> <input type="tel" placeholder="+91 5246578616" size="30" required>
            </div>
            <br>
            <div>
                <label>Residential Address:</label>
                <br>
                <textarea type="text" cols="80" rows="5"></textarea>
            </div>
        </fieldset>
        <fieldset>
            <legend>Account Information</legend>
            <div>
                <label>Account Type:</label>
                <select Name="account_type" required>
                <option value="">-----Select Your Account Type-----</option>
                <option>Savings Account</option>
                <option>Current Account</option>
                <option>Fixed Deposit</option>
                </select>
            </div>
            <br>
            <div>
                <label>Initial Deposit Amount</label>
                <input type="number" placeholder="Deposit Amount">
            </div>
            <br>
            <div>
                <label>Preferred Branch:</label>
                <input type="text" placeholder="Enter Your Branch Name" size="60">
            </div>
        </fieldset>
        <fieldset>
            <legend>Identification Details</legend>
            <div>
                <label>ID Proof Type:</label>
                <select type="id type">
                    <option value="">Select Your ID</option>
                    <option>Passport</option>
                    <option>National ID</option>
                    <option>Driver License</option>
                </select>
            </div>
            <br>
            <div>
                <label>ID Number:</label>
                <input type="text" placeholder="Enter Your ID Number" size="20" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Declaration</legend>
            <input type="checkbox" required> I declare that the information provided above is true and correct.
        </fieldset>
        <br>
        <button type="submit">Please Submit Your KYC Form</button> <button type="reset">Reset</button>
        
        </fieldset>
    </form>
    
        
</body>
</html>
