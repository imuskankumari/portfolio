<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Structure Enquiry Form(Student Registration)</title>
</head>
<body>
    <form id="Enquiry Form">
        <h2>Students Enquiry 2026</h2>
        <div>
            <input type="number" placeholder="Roll Number">
        </div>
        <div>
            <input type="text" placeholder="Student Full Name">
        </div>
        <div>
            <label>Gender:</label>
            <input type="radio" name="g">Female
            <input type="radio" name="g">Male
        </div>
        <div>
            <textarea rows="4" placeholder="Full Postal Address"></textarea>
        </div>
        <button type="submit"> Register Student</button>
    </form>
</body>
</html>
