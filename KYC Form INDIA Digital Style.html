<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Form INDIA Digital Style</title>
</head>
<body>
    <form>
        <h2>Digital KYC Verification</h2>
        <p>Date of Birth: <input type="date"></p>
        <p>Aadhar Number: <input type="text" maxlength="12" placeholder="1234 5678 9012"></p>
        <p>Upload ID Proof: <input type="file" accept="image/*,.pdf"></p>
        <button type="submit">Verify KYC</button>
    </form>

    
</body>
</html>
