<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Generation Form</title>
</head>

<body>
    <form>
        <h2>Lead Generation</h2>
        <p>Full Name: <input type="text" placeholder="Enter Name" required></p>
        <p>E-mail: <input type="email" placeholder="example@mail.com" required></p>
        <p>Interest:
            <select>
                <option>Graphic Designing</option>
                <option>Web Designing</option>
            </select>
        </p>
        <button type="submit">Submit Lead</button>
    </form>
</body>

</html>
