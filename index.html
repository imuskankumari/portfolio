<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskan Kumari | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo-area">
                <img src="mk.png" alt="Logo">
            </div>
            <nav class="nav-menus">
                <a href="#home">Home</a>
                <a href="#services">Services</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main class="main-wrapper" id="home">
        <section class="hero-branding-center">
            <h1>Muskan Kumari</h1>
            <div class="line"></div>
            <p class="designation">Graphic & Web Designer</p>
        </section>

        <section class="page-section">
            <div class="section-title">
                <h2>Software & <span class="cyan-text">Skills</span></h2>
            </div>
            <div class="master-skills-pyramid-box">
                <div class="pyramid-skills-row row-1">
                    <div class="skill-chip"><i class="fas fa-image"></i> Photoshop</div>
                    <div class="skill-chip"><i class="fas fa-vector-square"></i> Illustrator</div>
                    <div class="skill-chip"><i class="fas fa-book-open"></i> InDesign</div>
                </div>
                <div class="pyramid-skills-row row-2">
                    <div class="skill-chip"><i class="fas fa-pen-nib"></i> CorelDraw</div>
                    <div class="skill-chip"><i class="fas fa-wand-magic-sparkles"></i> Canva</div>
                    <div class="skill-chip"><i class="fab fa-html5"></i> HTML</div>
                    <div class="skill-chip"><i class="fab fa-css3-alt"></i> CSS</div>
                </div>
                <div class="pyramid-skills-row row-3">
                    <div class="skill-chip"><i class="fab fa-js"></i> JavaScript</div>
                    <div class="skill-chip"><i class="fab fa-wordpress"></i> WordPress</div>
                    <div class="skill-chip"><i class="fas fa-video"></i> Filmora</div>
                </div>
                <div class="pyramid-skills-row row-4">
                    <div class="skill-chip"><i class="fas fa-file-word"></i> MS Word</div>
                    <div class="skill-chip"><i class="fas fa-file-excel"></i> MS Excel</div>
                    <div class="skill-chip"><i class="fas fa-file-powerpoint"></i> MS PPT</div>
                </div>
            </div>
        </section>

        <section id="services" class="page-section portfolio-section">
            <div class="section-title">
                <h2>Graphic <span class="cyan-text">Designing</span></h2>
            </div>
            <div class="behance-style-grid" id="graphicDynamicGrid"></div>
        </section>

        <section id="contact" class="page-section contact-section">
            <div class="section-title">
                <h2>Let's work <span class="cyan-text">Together</span></h2>
            </div>
            </section>
    </main>

    <footer class="corporate-footer">
        <p>&copy; 2026 Muskan Kumari | Graphic & Web Designer | New Delhi, India</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
