<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Modern Table Form 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #333; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; vertical-align: middle; }
        
        /* Input Styling */
        input[type="text"], input[type="email"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        input:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 5px rgba(76, 175, 80, 0.2); }
        
        /* Button Styling */
        .submit-btn {
            background-color: #4CAF50; color: white; border: none; padding: 12px 25px; 
            border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s;
        }
        .submit-btn:hover { background-color: #45a049; }
        label { font-weight: 600; color: #555; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>पंजीकरण फॉर्म (Registration)</h2>
    <form action="#">
        <table>
            <tr>
                <td><label for="name">पूरा नाम:</label></td>
                <td><input type="text" id="name" name="name" placeholder="अपना नाम लिखें" required></td>
            </tr>
            <tr>
                <td><label for="email">ईमेल आईडी:</label></td>
                <td><input type="email" id="email" name="email" placeholder="example@mail.com" required></td>
            </tr>
            <tr>
                <td><label for="gender">लिंग (Gender):</label></td>
                <td>
                    <input type="radio" name="gen" value="M"> पुरुष 
                    <input type="radio" name="gen" value="F"> महिला
                </td>
            </tr>
            <tr>
                <td><label for="city">शहर:</label></td>
                <td>
                    <select id="city" name="city">
                        <option value="delhi">दिल्ली</option>
                        <option value="mumbai">मुंबई</option>
                        <option value="pune">पुणे</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="msg">संदेश:</label></td>
                <td><textarea id="msg" name="msg" rows="3"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="submit" class="submit-btn">सबमिट करें</button>
                </td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
