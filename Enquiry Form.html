<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
</head>

<body bgcolor="black">
    <form>
        <table align="center" width="1000" height="600" bgcolor="orange">
            <caption>
                <font color="orange" size="20"><b>Enquiry Form</b></font>
                <hr color="orange" size="4" width="400" align="center">
            </caption>
            <tr>
                <th align="left"><font color="maroon" size="4">Roll No.:</th>
                <td><input type="text" name="roll no." id="roll no." size="100"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Student Name:</th>
                <td><input type="text" placeholder="First Name" name="fn" size="48"> -&nbsp;<input type="text"
                        placeholder="Last Name" name="ln" size="45">
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Father's Name:</th>
                <td><input type="text" placeholder="Father's Name" size="100"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Date of Birth:</th>
                <td><input type="text" size="5" placeholder="Day"> -&nbsp;<input type="text" size="5"
                        placeholder="Month"> -&nbsp;<input type="text" size="5" placeholder="Year">&nbsp;(DD-MM-YYY)
                </td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Mobile N0.:</th>
                <td><input type="text" size="1" placeholder="+91"> <input type="text" size="93" placeholder="Enter Your Mobile Number"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">E-mail ID:</th>
                <td><input type="e-mail" size="100" placeholder="E-mail"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Passward:</th>
                <td><input type="password" size="100" placeholder="Passward"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Gender:</th>
                <td><input type="radio" name="gender">Female <input type="radio" name="gender">Male</td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Depatment:</th>
                <td><input type="checkbox" name="dait">CSE <input type="checkbox" name="dait">IT <input type="checkbox"
                        name="dait">ECE <input type="checkbox" name="dait">Civil <input type="checkbox" name="dait">Mech
                </td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Course:</th>
                <td><select name="degree" id="degree">
                        <option selected>--------------------Select Current Course's--------------------</option>
                        <option>BA</option>
                        <option>MA</option>
                        <option>BBA</option>
                        <option>MBA</option>
                        <option>B.com</option>
                        <option>B.sc</option>
                        <option>BCA</option>
                        <option>MCA</option>
                    </select></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Student Photo:</th>
                <td><input type="file"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">City:</th>
                <td><input type="text" size="100"></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Address:</th>
                <td><textarea name="textarea" cols="100" rows="10"></textarea></td>
            </tr>
            <tr>
                <th align="left"><font color="maroon" size="4">Register:</th>
                <td><input type="Register" size="5" value="Register"></td>
            </tr>
        </table>
    </form>
</body>

</html>
