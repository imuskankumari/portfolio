    <meta name="viewport" content="width=<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Individual KYC Updation Form 2026</title>
</head>
<body>

    <!-- Standard Indian KYC Form 2026 -->
    <form action="/api/submit-kyc" method="POST" enctype="multipart/form-data">
        <h1>Individual KYC Updation Form</h1>
        
        <!-- Section 1: Application Type -->
        <fieldset>
            <legend>Application Type</legend>
            <input type="radio" id="new" name="app_type" value="new" required>
            <label for="new">New KYC</label>
            <input type="radio" id="update" name="app_type" value="update">
            <label for="update">Update KYC</label>
            <br><br>
            <label for="ckyc_no">CKYC Number (Mandatory for Updates):</label>
            <input type="text" id="ckyc_no" name="ckyc_no" pattern="\d{14}" placeholder="14-digit Number">
        </fieldset>

        <!-- Section 2: Personal Details -->
        <fieldset>
            <legend>Personal Details</legend>
            <label for="full_name">Full Name (As per ID Proof)*:</label>
            <input type="text" id="full_name" name="full_name" required>
            <br><br>
            <label for="dob">Date of Birth*:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>
            <label for="pan">PAN Number*:</label>
            <input type="text" id="pan" name="pan" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" placeholder="ABCDE1234F" required>
        </fieldset>

        
        <fieldset>
            <legend>Officially Valid Documents (OVD)</legend>
            <p>Select one document for identity & address verification*:</p>
            <select name="ovd_type" required>
                <option value="">--Select OVD--</option>
                <option value="passport">Passport</option>
                <option value="voter_id">Voter ID Card</option>
                <option value="driving_license">Driving Licence</option>
                <option value="nrega">NREGA Job Card</option>
                <option value="npr">National Population Register (NPR) Letter</option>
                <option value="aadhaar">Aadhaar (Masked Copy Only)</option>
            </select>
            <br><br>
            <label for="ovd_no">Document Identification Number*:</label>
            <input type="text" id="ovd_no" name="ovd_no" required>
            <br><br>
            <label for="ovd_file">Upload Self-Attested Copy (PDF/JPG):</label>
            <input type="file" id="ovd_file" name="ovd_file" accept=".pdf,.jpg,.jpeg" required>
        </fieldset>

        <!-- Section 4: Contact Information -->
        <fieldset>
            <legend>Contact Details</legend>
            <label for="mobile">Mobile Number (Linked to Aadhaar)*:</label>
            <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="9876543210" required>
            <br><br>
            <label for="email">Email ID:</label>
            <input type="email" id="email" name="email">
        </fieldset>

        <!-- Section 5: Declarations (Mandatory for 2026) -->
        <fieldset>
            <legend>Declarations & Consent</legend>
            <div style="margin-bottom: 10px;">
                <input type="checkbox" id="consent_ckyc" name="consent_ckyc" required>
                <label for="consent_ckyc">I hereby give consent to download/upload my KYC records from/to the [Central KYC Records Registry](https://www.ckycindia.in).</label>
            </div>
            <div>
                <input type="checkbox" id="declaration" name="declaration" required>
                <label for="declaration">I declare that the details provided are true and correct as per [RBI 2026 Guidelines](https://www.rbi.org.in).</label>
            </div>
        </fieldset>

        <br>
        <button type="submit">Submit KYC Application</button>
    </form>

</body>
</html>
