<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Changer</title>
</head>
<body>
    <h1><u>Automatic Number Changer</u></h1>
    <input type="text" id="numDisplay" value="0" readonly>
    <button onclick="startAutoChange()">Automatic Changer</button>
    <script>
        myNumbers =[10,25,50,75,100];
        i=0;
        function startAutoChange()
        {
         setInterval(function() {
            if(i<myNumbers.length) {
                document.getElementById("numDisplay").value=myNumbers[i];
                i=i+1;
            } else {
                i=0
            }
         },1000);   
        }
    </script>
</body>
</html>
