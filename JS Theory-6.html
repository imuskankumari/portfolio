<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Theory-6</title>
</head>
<body>
<script>
        document.write("<h1><u>Nested IF Else</u></h1>");
        document.write("<h2><u>Example: 1</u><h2>");
        document.write("<h4>Question is Kya ? 5 Number 10 se big hai.</h4>"+"<br>");
        document.write("Answer - ");
        num = 15;
        if(num > 5) { 
            if(num > 10) {
                document.write("Number 10 is Big.");
            } else {
                document.write("Number 5 or 10 ke beech hai");
            }
            } else {
                document.write("Number 5 se Chota hai");
            }
            document.write("<h2><u>Example: 2</u></h2>");
            num = 10;
            if(num>0) {
                if(num % 1 == 0) {
                    document.write("This is Positive Even Number");
                } else {
                    document.write("This is Negative Odd ?Number");
                }
            } else {
                if(num == 0) {
                    document.write("Number is Zero");
                } else {
                    document.write("This is Negative Number");
                }
            }
        document.write("<br>");
        document.write("<hr width=400px align=left color=gray>");
        document.write("<h1><u>Nested Else IF</u></h1>");
        document.write("<h2><u>Example: 1</u><h2>");
        marks = 75;
        if(marks > 90) {
            document.write("Grade A Pass");
            } else if (marks > 70) {
                document.write("Grade B Pass");
            } else if (marks > 50) {
                document.write("Grade C Pass");
            } else {
                document.write("Grade E Fail");
            }
        document.write("<h2><u>Example: 2</u><h2>");
        marks = 75;
        if(marks>=90) {
            document.write("Grade A");
        } else if(marks>=75) {
            if(marks>=80) {
                document.write("Grade B+");
            } else {
                document.write("Grade B");
            }
        } else if(marks = 50) {
            document.write("grade C");
        } else {
            document.write("Fail");
        }

        document.write("<br>");
        document.write("<br>");
        document.write("<hr width=400px align=left color=grey>");
        document.write("<h1><u>Switch Case Example: 1</u></h1>")
        day = 2;
        switch (day) {
            case 1:document.write("Today Is Sunday");break;
            case 2:document.write("Today Is Monday");break;
            case 3:document.write("Today Is Tuesday");break;
            case 4:document.write("Today Is Wednesday");break;
            case 5:document.write("Today Is Thursday");break;
            case 6:document.write("Today Is Friday");break;
            case 7:document.write("Today Is Saturday");break;
            default:document.write("I don't know the day.")
        }
        document.write("<br>");
        document.write("<br>");
        document.write("<hr width=400px align=left color=grey>");
        document.write("<h1><u>Switch Case Example: 2</u></h1>")
        a = prompt("Enter the Day");
        switch (a) {
            case"Sunday":
            document.write("Today is Sunday");
            break;
            case"Monday":
            document.write("Today is Monday");
            break;
            case"Tuesday":
            document.write("Today is Tuseday");
            break;
            case"Wednesday":
            document.write("Today is Wednesday");
            break;
            case"Thursday":
            document.write("Today is Thursday");
            break;
            case"Friday":
            document.write("Today is Friday");
            break;
            case"Saturday":
            document.write("Today is Saturday");
            default:
                document.write("Enter the Correct Value");
        }
        document.write("<br>");
        document.write("<br>");
        document.write("<hr width=400px align=left color=grey>");
</script>
        <h1><u>Switch Case Example: 3</u></h1>
        <form name="f1">
            <label>Select the Color of Background</label>
            <input type="text" id="color1">
            <input type="button" value="set bg" onclick="bg()">
        </form>
        <script>
            function bg() {
                x = document.f1.color1.value.toLowerCase().trim();
            
            switch(x) {
                case'red':
                document.body.style.backgroundColor="red";
                document.body.style.color="White";
                break;
                case"blue":
                document.body.style.backgroundColor="blue";
                document.body.style.color="yellow";
                break;
                case"green":
                document.body.style.backgroundColor="green";
                document.body.style.color="white";
                break;
                case"purple":
                document.body.style.backgroundColor="purple";
                document.body.style.color="White";
                break;
                case"orange":
                document.body.style.backgroundColor="white";
                document.body.style.color="black";
            }
            }
        </script>
        <h1><u>Events Onchange with bg,fg Colors<br>(What color you want usin OnChange)</u></h1>
        <input type="text" onchange="changeColor()">
        <script>
            function changeColor() {
                document.body.style.backgroundColor="orange";
                document.body.style.color="white";
            }
        </script>
        
</body>
</html>
