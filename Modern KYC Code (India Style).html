<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern KYC Code(India Style)</title>
</head>
<body>
    <form>
        <h2>India Digital KYC Verification</h2>
        <p>Aadhar Number (12 Digit):<br>
        <input type="text" maxlength="12" placeholder="0000 0000 0000"></p>
        <p>PAN Card Number:<br>
            <input type="text" maxlength="10" placeholder="ABCDE1234F">
        </p>
        <p>Upload Photo ID:<br>
        <input type="file" accept="image/*">
        </p>
        <button type="submit">Verify My KYC</button>
    </form>
    
</body>
</html>
